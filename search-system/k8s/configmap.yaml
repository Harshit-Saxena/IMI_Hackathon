apiVersion: v1
kind: ConfigMap
metadata:
  name: search-system-config
  namespace: search-system
data:
  config.yaml: |
    app:
      port: 8080
      env: production
      warmup_datasets: 50

    postgres:
      host: postgres
      port: 5432
      user: searchuser
      password: ""          # injected via POSTGRES_PASSWORD env var from Secret
      dbname: searchdb
      max_connections: 25
      max_idle: 5

    elasticsearch:
      host: http://elasticsearch:9200
      index_prefix: search_
      refresh_interval: 30s

    redis:
      host: redis:6379
      max_memory: 2gb
      eviction_policy: allkeys-lru
      memory_capacity: 1000

    kafka:
      broker: kafka:9092
      topics:
        upserted: records.upserted
        deleted:  records.deleted
        changed:  dataset.changed
      consumer_lag_threshold: 500

    search:
      in_memory_limit:  100000
      bleve_file_limit: 5000000
      bleve_data_dir:       /data/bleve
      default_result_limit: 20
      stability_threshold:     0.70
      stability_tick:          0.05
      stability_decay:         0.80
      tier_upgrade_confirmations: 5
      outbox_poll_interval: 500ms
      outbox_max_attempts:  5
      batch_size:   1000
      worker_count: 10
      reconcile_interval: 5m
