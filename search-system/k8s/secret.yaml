# IMPORTANT: Replace all values before deploying to production.
# Never commit real passwords to version control.
# Generate passwords with: openssl rand -base64 32
apiVersion: v1
kind: Secret
metadata:
  name: search-system-secrets
  namespace: search-system
type: Opaque
stringData:
  POSTGRES_PASSWORD: "changeme-generate-with-openssl"
  REDIS_PASSWORD: ""
  ES_PASSWORD: ""
  TLS_CERT_FILE: ""    # path to TLS cert (leave empty to disable TLS)
  TLS_KEY_FILE: ""     # path to TLS key (leave empty to disable TLS)
